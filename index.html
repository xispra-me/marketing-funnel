const FUNNELS = {
  fitness: {
    name: "Weight Management",
    icon: "🏋️",
    tagline: "\"Celebrity trainer reveals 3 fat loss secrets...\"",
    also: "Also: abs programmes, fitness apps, supplement stacks, body transformation challenges",
    color: "#ff4848",
    quiz: [
      { id: "gender", q: "What best describes you?", opts: ["Male", "Female"], meta: "One tap. You're in. This single answer changes every pronoun and image in the pitch." },
      { id: "age", q: "How old are you?", opts: ["18–29", "30–39", "40–49", "50+"], meta: "Calibrates the urgency. Younger: 'imagine 6 months from now.' Older: 'it's NOT too late.'" },
      { id: "goal", q: "What's your #1 goal?", opts: ["Lose weight", "Get toned", "Build muscle", "Feel healthier"], meta: "Now they know which emotional lever to pull. This word will appear in 'your personalised results.'" },
      { id: "struggle", q: "Your biggest struggle?", opts: ["Can't stay consistent", "Don't know what to eat", "No time", "Nothing works"], meta: "Pain point harvesting. This exact phrase gets read back to you as if it's a diagnosis." },
      { id: "activity", q: "How active are you?", opts: ["Sedentary", "Light", "Moderate", "Very active"], meta: "Determines which 'mistake' they emphasise. Active? 'You're overtraining.' Sedentary? 'You need the right programme.'" },
    ],
    getProfile: (a) => {
      const g = a.goal || "Lose weight";
      const types = {
        "Lose weight": { type: "Adaptive", emoji: "🔄", line: "Your metabolism has adapted against you" },
        "Get toned": { type: "Rebound", emoji: "🔁", line: "Doing the work but can't break through" },
        "Build muscle": { type: "Accelerator", emoji: "⚡", line: "Fast metabolism, slow progress" },
        "Feel healthier": { type: "Balanced", emoji: "🌿", line: "Ready to transform but need the right path" },
      };
      return types[g] || types["Lose weight"];
    },
    phases: (a, p) => {
      const isMale = a.gender === "Male";
      const older = a.age === "40–49" || a.age === "50+";
      const str = a.struggle || "Nothing works";
      return {
        mirror: `Based on your answers, you're the ${p.type} Type. ${str === "Can't stay consistent" ? "You start strong but life gets in the way. Every Monday is a fresh start that fades by Wednesday." : str === "Don't know what to eat" ? "You've been flooded with conflicting advice — keto, paleo, intermittent fasting — and none of it sticks." : str === "No time" ? "Between work and life, finding an hour for the gym feels impossible. When you do go, you're not sure you're doing the right things." : "You've tried the diets. You've done the workouts. You've even seen some results — but they never last."} ${isMale ? "You avoid taking your shirt off." : "You avoid certain outfits."} ${older ? "And you're wondering if your body just doesn't respond like it used to." : "And you're starting to wonder if some people are just built differently."}`,
        agitate: `You've ${str === "Can't stay consistent" ? "started and stopped more programmes than you can count. Each time you feel worse about yourself" : str === "No time" ? "tried squeezing in workouts before dawn, watched YouTube videos at 2x speed, bought equipment that gathers dust" : "tried cutting calories, upping cardio, following influencer advice that contradicts itself every week"}. ${older ? "Every year it gets harder. The weight creeps on. The energy drops." : "People around you seem to manage it effortlessly. What are they doing that you're not?"} Maybe it's genetics. Maybe it's discipline. Maybe some people just can't do this.`,
        eliminate: `Here's the truth. It's NOT your genetics. ${older ? "It's NOT your age." : "It's NOT your willpower."} The problem is that you've been following advice designed for beginners — or worse, advice designed to sell supplements. Standard 'eat less move more' causes metabolic adaptation. Your body fights back. What you need is a completely different approach based on YOUR specific body type.`,
        authority: `I used to struggle with the same thing. ${isMale ? "Before I became a fitness model, I was overweight and lost." : "I spent years fighting my own body before I figured it out."} I've now helped over 10,000 people break through. Not with willpower. Not with restriction. With science-based methods that work WITH your body, not against it.`,
        m1: `You're training wrong. ${a.activity === "Very active" ? "More gym time is actually working AGAINST you. In a deficit, you can't recover — you're overtrained, flat, and frustrated." : "When you do train, you're doing generic routines that waste your time."} The answer is time under tension — fewer sets, 40–60 seconds each. More muscle growth in less time. But the specific exercises and weights matter — get them wrong and nothing happens.`,
        m2: `You're eating wrong. Not too much or too little — wrong PATTERN. Carb cycling matches your nutrition to your training days. More fuel when you need it, deficit when you don't. Your body never adapts because the stimulus changes. The key is knowing exactly which days, how many grams, and when to time your meals.`,
        m3: `Your cardio is backwards. Long steady-state sessions are breaking down muscle. HIIT — 15 minutes, specific protocols — creates an afterburn that lasts 48 hours. But timing and intensity are everything. Wrong protocol on the wrong day and you're wasting your time.`,
        gap: `So which exercises, exactly? How many carbs on which days? What HIIT protocol? The concepts make sense — but the details make it work. You could experiment for months... or you could follow the exact blueprint I've created. No guesswork.`,
        value: `The complete system: carb cycling calculator, 90 days of filmed workouts (gym and home), 3 rotating HIIT protocols, PLUS a recipe book, a core programme, and a ${isMale ? "muscle definition" : "body sculpting"} bonus. Total value: £230+.`,
        price: `A personal trainer charges £50/hour — that's £600 for 12 sessions. This is everything, forever, for £67. One payment. Instant access. Why? Because I want to help as many people as possible.`,
      };
    },
    advice: [
      { icon: "⚖️", title: "Energy balance is the only mechanism", detail: "Every diet that works — keto, IF, paleo, carb cycling — works because it gets you eating the right amount. No metabolic hacks, no confusion. Find an eating pattern you can sustain for years." },
      { icon: "🏋️", title: "Progressive resistance training", detail: "Gradually increase weight, reps, or volume. 2–4 sessions/week. Compound movements. Time under tension is one real variable among many — not a cheat code." },
      { icon: "🥗", title: "Eat a proper balanced diet", detail: "Plenty of vegetables, adequate protein (1.6–2.2g/kg), whole grains, healthy fats. You don't need supplements — you need to eat properly. A food tracker like Nutricheck can help you understand what you're actually eating." },
      { icon: "😴", title: "Sleep 7–9 hours", detail: "Poor sleep raises hunger hormones, tanks recovery, spikes cortisol. It's free — which is why nobody tries to sell it to you." },
      { icon: "📅", title: "Consistency over months and years", detail: "The industry sells 90-day transformations because urgency converts. Real change takes sustained effort over 12+ months." },
      { icon: "🧠", title: "Behaviour change matters more than information", detail: "You probably already know roughly what to do. Consistency is the hard part — that's a habits and psychology problem, not a PDF problem." },
    ],
    resources: [
      { name: "Nutricheck / Calorie Counter", desc: "Practical food tracking without the noise", where: "App Store" },
      { name: "Jeff Nippard", desc: "Evidence-based training & nutrition", where: "YouTube" },
      { name: "Renaissance Periodization", desc: "Hypertrophy science — Dr Mike Israetel", where: "YouTube" },
      { name: "Stronger By Science", desc: "Research-backed programmes", where: "Website" },
      { name: "NHS Better Health", desc: "Free, no-nonsense UK guidance", where: "nhs.uk" },
      { name: "Andy Galpin", desc: "Exercise physiology deep dives", where: "YouTube" },
    ],
  },

  taichi: {
    name: "Tai Chi / Wellness",
    icon: "🧘",
    tagline: "\"Ancient master reveals the 3 movements Western instructors won't teach...\"",
    also: "Also: yoga, posture correction, breathwork, qigong, meditation apps",
    color: "#8b5cf6",
    quiz: [
      { id: "age", q: "What's your age range?", opts: ["Under 40", "40–54", "55–64", "65+"], meta: "Over-50s wellness is a massive market. Age = urgency + vulnerability." },
      { id: "experience", q: "Tai chi experience?", opts: ["Complete beginner", "Watched videos", "Attended classes", "Regular practice"], meta: "Determines whether they pitch 'unlock the secrets' or 'what your instructor isn't telling you.'" },
      { id: "interest", q: "What drew you to tai chi?", opts: ["Balance & fall prevention", "Stress & anxiety", "Joint pain / mobility", "Spiritual practice"], meta: "The emotional lever. Health anxiety is the most powerful motivator in this demographic." },
      { id: "struggle", q: "What's held you back?", opts: ["Don't know where to start", "Classes feel too slow/fast", "Not sure I'm doing it right", "Can't find good instruction"], meta: "Insecurity harvesting. 'Not sure I'm doing it right' is the golden answer — it creates dependency." },
      { id: "time", q: "How much time can you commit?", opts: ["5 mins/day", "15 mins/day", "30 mins/day", "I have plenty of time"], meta: "'Only 5 minutes' is the answer they want. It lets them promise results with minimal effort." },

      const types = {

    phases: (a, p) => {
      const older = a.age === "55–64" || a.age === "65+";
      const beginner = a.experience === "Complete beginner" || a.experience === "Watched videos";
      const str = a.struggle || "Not sure I'm doing it right";
      return {
        mirror: `Based on your answers, your energy profile is ${p.type}. ${a.interest === "Balance & fall prevention" ? "You're concerned about stability — maybe you've had a fall, or you've noticed your balance isn't what it was. You want to feel safe and confident on your feet." : a.interest === "Stress & anxiety" ? "You carry tension. Maybe it's work, family, health worries. You've heard tai chi can help but you're not sure where to start or if you're doing it right." : a.interest === "Joint pain / mobility" ? "Your body doesn't move the way it used to. Stiffness in the morning. Aches that linger. You've heard tai chi is gentle enough to help without making things worse." : "You're drawn to something deeper — a practice that connects mind, body, and spirit. But most of what you find online feels shallow or commercialised."} ${str === "Not sure I'm doing it right" ? "And the worst part — you're never sure if you're actually doing it correctly." : ""}`,
        agitate: `${beginner ? "You've watched YouTube videos but they all contradict each other. Some say start with the 24 form, others say the 8 form, others say forget forms entirely." : "You've been to classes, maybe several, but something's missing. The instructor rushes through movements or doesn't explain the principles."} ${older ? "And there's a clock ticking — every month that passes, your mobility, balance, and energy decrease a little more." : "You feel like you're going through the motions without understanding what you're actually doing."} ${a.interest === "Joint pain / mobility" ? "Meanwhile your joints are getting stiffer and you're worried about what the next 5 years look like." : "You sense the potential but can't unlock it."}`,
        eliminate: `Here's what most people don't realise. ${beginner ? "90% of tai chi content online teaches MOVEMENTS without the PRINCIPLES. It's like learning to type without understanding language." : "Most Western tai chi instructors learned a simplified version stripped of the authentic internal arts principles."} The forms are just the surface. Without understanding qi flow, rooting, and the internal mechanics, you're doing slow-motion aerobics. Not tai chi.`,
        authority: `I studied under Master [Name] in Wudang for 7 years. ${older ? "I've worked with thousands of over-50s" : "I've taught students across 40 countries"} and I've seen the same pattern: people practising for years without ever accessing the real benefits. Because nobody taught them the 3 foundational principles that change everything.`,
        m1: `You're learning forms without foundations. ${beginner ? "Starting with a long form is like learning to run before you can stand." : "Even experienced practitioners skip the standing meditation (zhan zhuang) that builds real internal connection."} The ancient masters spent YEARS on standing practice before learning a single form. 5 minutes of correct standing practice is worth more than an hour of empty forms.`,
        m2: `Your breathing is disconnected. Most instructors teach movements and assume breathing will follow. It won't. There's a specific diaphragmatic pattern — ${a.interest === "Stress & anxiety" ? "proven to activate the parasympathetic nervous system and reduce cortisol" : a.interest === "Joint pain / mobility" ? "that drives synovial fluid into your joints and reduces inflammation" : "that directs qi to your lower dantian, creating the root all movement flows from"}. Without it, you're getting 30% of the benefit.`,
        m3: `Your practice timing is wrong. ${a.time === "5 mins/day" ? "5 minutes CAN be enough — but only if it's the RIGHT 5 minutes." : "More practice isn't better — CORRECT practice at the right time of day is."} The ancient practitioners aligned with circadian qi flow. ${older ? "For over-50s especially, morning practice before the body stiffens is critical." : "Early morning or late evening — when the world is still — amplifies the internal work."} Random practice at random times produces random results.`,
        gap: `So which standing posture exactly? What breathing pattern? What time, for how long, in what sequence? The principles make sense — but the specific practice protocol makes it work. You could spend years experimenting... or you could follow the exact programme I've created.`,
        value: `The complete system: 12-week progressive programme from standing foundations through full form. Daily guided videos — ${a.time === "5 mins/day" ? "starting at just 5 minutes" : "15–30 minutes each"}. Breathing protocol library. ${a.interest === "Joint pain / mobility" ? "Joint restoration sequences" : a.interest === "Balance & fall prevention" ? "Balance confidence programme" : "Meditation integration module"}. PLUS: printed wall chart (£25 value, FREE). Qi gong morning routine (£35 value, FREE). Private community access (£47 value, FREE). Total value: £200+.`,
        price: `A private tai chi instructor charges £40–£60/hour. 12 sessions = £600+. This entire programme: £57. One payment. Lifetime access. Because authentic tai chi should be accessible to everyone.`,
      };
    },
    advice: [
      { icon: "🧍", title: "Find a real teacher — in person", detail: "No video course replaces a qualified instructor who can see your posture, correct your alignment, and adapt to your body. Look for TCUGB-registered instructors in the UK." },
      { icon: "🦶", title: "Consistency beats intensity", detail: "10 minutes daily is worth more than a 2-hour weekend session. The research on tai chi benefits (balance, BP, anxiety) is based on regular, sustained practice over months." },
      { icon: "🧠", title: "It's exercise, not magic", detail: "Tai chi has genuine evidence for balance, fall prevention, blood pressure, and stress. The 'qi flow' and 'energy channels' framing is cultural context — the benefits come from slow, controlled movement, weight transfer, and focused breathing." },
      { icon: "⚠️", title: "Beware 'lineage' gatekeeping", detail: "'My master learned from the REAL master' is the tai chi equivalent of 'body types.' There are many valid styles and approaches. Anyone claiming exclusive access to 'authentic' teaching is selling you something." },
      { icon: "📚", title: "The principles ARE freely available", detail: "Weight shifting, rooting, relaxation (song), silk reeling — these are well-documented. Books by Yang Jwing-Ming, Chen Xiaowang's videos, or Tai Chi Union courses teach them without the mystical upsell." },
      { icon: "🏥", title: "For health conditions, talk to your GP", detail: "Tai chi is excellent gentle exercise, but 'qi stagnation' is not a medical diagnosis. If you have joint pain, balance issues, or anxiety, your GP and a physiotherapist should be your first stops." },
    ],
    resources: [
      { name: "Tai Chi Union for Great Britain", desc: "Find registered instructors near you", where: "taichiunion.com" },
      { name: "Yang Jwing-Ming", desc: "Respected author & teacher — books and videos", where: "Books / YouTube" },
      { name: "NHS recommended exercise", desc: "Tai chi listed as beneficial for over-65s", where: "nhs.uk" },
      { name: "Local council classes", desc: "Often subsidised, in-person, social", where: "Your council website" },
      { name: "Chen Xiaowang Foundation", desc: "Free instructional content from a grandmaster", where: "YouTube" },
    ],
  },

  photography: {
    name: "Photography",
    icon: "📸",
    tagline: "\"Pro photographer reveals the 3 settings most photographers never discover...\"",
    also: "Also: piano, guitar, drawing, golf swing, music production, watercolour",
    color: "#f59e0b",
    quiz: [
      { id: "level", q: "Your photography experience?", opts: ["Phone only", "Just got a camera", "Intermediate", "Advanced but stuck"], meta: "'Advanced but stuck' is the golden answer — it justifies a premium pitch to someone who already knows the basics." },
      { id: "camera", q: "What do you shoot with?", opts: ["iPhone / phone", "Mirrorless", "DSLR", "Multiple systems"], meta: "Gear envy is the engine of photography marketing. This answer determines the 'you need to unlock YOUR camera's potential' angle." },
      { id: "genre", q: "What do you love shooting?", opts: ["Landscape / nature", "Portraits / people", "Street / documentary", "Astro / night"], meta: "Determines the aspirational images they'll show. Landscapes get misty mountains. Portraits get creamy bokeh." },
      { id: "frustration", q: "Your biggest frustration?", opts: ["Photos look flat", "Can't get sharp focus", "Editing overwhelms me", "Lack creative vision"], meta: "Another pain-point harvest. 'Lack creative vision' is perfect — it's vague enough to mean anything and sells the 'you need MY framework' pitch." },
      { id: "time", q: "How much time for photography?", opts: ["Weekends only", "A few hours/week", "It's my main hobby", "Aspiring professional"], meta: "'Aspiring professional' signals willingness to spend. They'll pitch the expensive tier." },
    ],
    getProfile: (a) => {
      const types = {
        "Photos look flat": { type: "Technical", emoji: "📐", line: "You're missing the light-reading instinct" },
        "Can't get sharp focus": { type: "Precision", emoji: "🎯", line: "Your autofocus workflow needs resetting" },
        "Editing overwhelms me": { type: "Raw Potential", emoji: "💎", line: "Your files contain hidden quality" },
        "Lack creative vision": { type: "Visionary", emoji: "👁️", line: "You see the world differently — you just need the framework" },
      };
      return types[a.frustration] || types["Photos look flat"];
    },
    phases: (a, p) => {
      const pro = a.time === "Aspiring professional";
      const beginner = a.level === "Phone only" || a.level === "Just got a camera";
      const genre = a.genre || "Landscape / nature";
      return {
        mirror: `Based on your answers, you're the ${p.type} Type. ${a.frustration === "Photos look flat" ? "You take the photo, look at the back of the camera, and it looks... fine. But it doesn't look like the images you admire. There's no depth, no mood, no 'wow.' You know something's missing but you can't name it." : a.frustration === "Can't get sharp focus" ? "You've had that moment — the perfect composition, the perfect light, and then you get home and the focus is slightly off. Or the wrong eye is sharp. Or it's just... soft. It's infuriating." : a.frustration === "Editing overwhelms me" ? "You shoot in RAW because everyone says you should. Then you open Lightroom and face 150 sliders and no idea which ones matter. Your photos sit on a hard drive, unedited, unseen." : "You can take a technically competent photo. Exposure is fine. Focus is fine. But it's boring. It looks like everyone else's. You scroll through Instagram and wonder what separates good from great."}`,
        agitate: `${beginner ? "You've watched YouTube tutorials — 'shoot in manual!' — but in the moment, you panic and switch back to auto." : "You've been shooting for a while now. You've watched hundreds of tutorials. You've upgraded your gear."} But your photos still don't look like the ones you admire. ${genre === "Landscape / nature" ? "Those atmospheric shots with perfect light and incredible depth — how do they DO that?" : genre === "Portraits / people" ? "Those portraits where the subject seems to glow — creamy backgrounds, perfect skin tones — yours look like snapshots by comparison." : genre === "Street / documentary" ? "Those decisive moments that tell a story in a single frame — you're there but you never seem to catch them." : "Those incredible night shots with pinpoint stars and rich foreground — yours are noisy, blurry, or both."} Maybe you need a better lens. Maybe you need more talent.`,
        eliminate: `Here's the truth. It's NOT your gear. ${beginner ? "Phone cameras today are genuinely incredible — the limitation isn't the sensor." : "You could hand a master photographer a £300 camera and they'd outshoot most people with a £3,000 setup."} It's NOT about talent either. ${pro ? "Most working professionals aren't artistic geniuses — they've internalised a system." : "Photography is a learnable skill, not a gift."} The problem is that tutorials teach you WHAT to do — aperture, shutter speed, ISO — but not HOW TO SEE.`,
        authority: `I've been a professional photographer for 15 years. My work has appeared in [impressive publications]. I've mentored over 5,000 students. And I'll tell you a secret: for the first 3 years, my photos were mediocre. It wasn't until I discovered these 3 principles — principles most YouTube tutorials completely ignore — that everything changed.`,
        m1: `You're chasing settings when you should be reading light. ${a.frustration === "Photos look flat" ? "Flat photos happen because of flat light — not wrong settings." : "Technical problems are usually light problems in disguise."} There's a framework I call the Light Triangle — direction, quality, and colour temperature. Once you see light this way, you'll ${genre === "Landscape / nature" ? "know exactly when and where to be for extraordinary landscapes" : genre === "Portraits / people" ? "instantly see where to position your subject for stunning natural light" : "read any scene in seconds and know exactly how it will render"}. But it's not just 'golden hour good, midday bad' — there are specific techniques for EVERY lighting condition.`,
        m2: `Your composition is following rules instead of principles. Rule of thirds? Leading lines? These are training wheels that actually LIMIT your creativity. The masters use visual weight, tension, and negative space — a completely different framework that produces ${genre === "Street / documentary" ? "images that stop people mid-scroll" : "compositions that feel inevitable, like nothing else could have worked"}. But you can't learn this from a YouTube thumbnail — it requires structured practice with feedback.`,
        m3: `Your editing workflow is either overdone or underdone. ${a.frustration === "Editing overwhelms me" ? "You're staring at 150 sliders when only 6 of them matter for 95% of images." : "You're probably over-processing to compensate for what should have been captured in-camera."} I use a 6-slider method that takes under 3 minutes per photo and produces results that look ${pro ? "magazine-ready" : "better than hours of tweaking"}. But the 6 sliders are different for every genre — and the ORDER matters.`,
        gap: `So which light to look for, exactly? Which composition framework? Which 6 sliders in which order? The concepts make sense — but the specific framework makes it work. You could spend years developing an eye... or you could follow the exact system I've built.`,
        value: `The complete system: 12-week progressive programme from light-reading through advanced composition. ${genre}-specific modules. Daily photo challenges with before/after examples. 6-slider editing presets for Lightroom. PLUS: a RAW file practice library (£30 value, FREE). Printed composition cheat sheet (£15 value, FREE). ${pro ? "Portfolio review template" : "Instagram optimisation guide"} (£25 value, FREE). Total value: £180+.`,
        price: `A private photography workshop costs £200–£400 per day. A mentorship programme runs £1,000+. This entire system: £47. One payment. Lifetime access. Because I believe great photography shouldn't be locked behind a price tag.`,
      };
    },
    advice: [
      { icon: "📷", title: "Shoot more. A lot more.", detail: "Volume is the single best teacher. Shoot daily, even for 10 minutes. Review your work critically. The feedback loop of shoot → review → adjust is how every good photographer improves." },
      { icon: "💡", title: "Learn to see light", detail: "This is the one thing the funnels get right (then paywall). Observe how light falls on faces, buildings, landscapes. Direction, quality (hard/soft), colour. Practice noticing it when you don't have a camera." },
      { icon: "📖", title: "Study photographs, not settings", detail: "Look at work by photographers you admire. Ask: why does this work? Where was the light? What's in the frame and what isn't? Books of photography teach more than camera tutorials." },
      { icon: "🎨", title: "RAW processing is simple once you understand it", detail: "White balance, exposure, highlights, shadows, clarity, saturation. That's genuinely 90% of it. Everything else is refinement. A free trial of Lightroom or Capture One is all you need to start." },
      { icon: "🚫", title: "Gear is almost never the problem", detail: "The best camera is the one you have. An iPhone in good light with good composition beats a £5,000 camera with bad composition. Don't upgrade until you can articulate exactly what limitation you're hitting." },
      { icon: "👥", title: "Get feedback from real people", detail: "Join a local camera club. Post to r/photocritique. Find a mentor. No online course replaces honest human feedback on YOUR specific work." },
    ],
    resources: [
      { name: "Sean Tucker", desc: "Philosophy of photography, light, and seeing", where: "YouTube" },
      { name: "James Popsys", desc: "Honest, practical landscape photography", where: "YouTube" },
      { name: "r/photocritique", desc: "Free community feedback on your work", where: "Reddit" },
      { name: "Local camera clubs", desc: "In-person feedback, workshops, social", where: "Google '[your town] camera club'" },
      { name: "Magnum Photos / LensCulture", desc: "Study the masters — free online archives", where: "Websites" },
      { name: "Your local library", desc: "Photography books for free — Salgado, McCurry, Leibovitz", where: "Library" },

        agitate: `${basic ? "You've tried ChatGPT. Asked it to write an email. Maybe generated an image for fun. But you know you're barely scratching the surface. Meanwhile," : "You use AI daily but you can see people getting 10x more from it. Custom workflows, automation, things you didn't even know were possible. Meanwhile,"} ${fearBased ? "your colleagues are starting to mention AI in meetings. Your industry publications are running 'AI transformation' features weekly. Job postings now list 'AI proficiency' as a requirement. The gap between people who GET it and people who don't is widening every month." : business ? "competitors are shipping AI features. Startups with 2 people are outperforming teams of 20 using AI. The leverage is insane — if you know how to use it." : "you're watching YouTube videos that are already outdated by the time you finish them. The landscape changes every week. How are you supposed to keep up?"} ${a.blocker === "Information overload" ? "There are 10,000 AI courses, 50,000 YouTube tutorials, and a new 'game-changing' tool every day. The noise is deafening." : ""}`,

        authority: `I've been working with AI since before ChatGPT made it mainstream. I've helped Fortune 500 companies implement AI strategies. I've trained ${business ? "over 2,000 business leaders" : technical ? "developers at companies like Google and Amazon" : "over 10,000 professionals across every industry"} to go from AI-curious to AI-fluent. And I'll tell you what I tell all of them: most of what you've been told about AI is either wrong, outdated, or designed to sell you the next course.`,
        m1: `You're writing prompts when you should be building systems. ${basic ? "Everyone focuses on 'prompt engineering' — crafting the perfect single question. That's like learning to type one letter really well." : "Even experienced users treat AI as a question-answering box."} The real power is in ${business ? "AI workflows — chains of prompts that automate entire business processes" : technical ? "agentic systems and tool use — AI that can take actions, not just generate text" : "structured frameworks — reusable prompt systems that produce consistent, reliable output every time"}. But the specific architecture of these systems matters — get the structure wrong and you get inconsistent garbage.`,
        m2: `You're using one tool when you should be orchestrating many. ${basic ? "ChatGPT is one tool. There are hundreds — and the magic happens when you combine them." : "You're probably doing everything in one chat window."} The professionals use ${business ? "AI stacks — content generation into editing into publishing into analytics, all connected" : technical ? "multi-model architectures — different models for different strengths, orchestrated together" : "tool chains — research tool feeds writing tool feeds design tool, each optimised for its job"}. But which tools, in what order, with what connections — that's the system I've built.`,
        m3: `You're learning AI like it's 2023. ${fearBased ? "The landscape has changed completely in the last 6 months alone." : "What worked 6 months ago is already outdated."} ${technical ? "Fine-tuning is giving way to RAG. Prompt engineering is giving way to tool use. Single-model approaches are giving way to multi-agent systems." : "The tools, the capabilities, the best practices — they shift every quarter."} You need a learning SYSTEM that adapts, not a static course that's outdated before you finish it. But building that system requires understanding the meta-patterns — and that's what nobody teaches.`,

  language: {

      { id: "goal", q: "What does fluency mean to you?", opts: ["Travel conversations", "Watch films without subs", "Professional fluency", "Think in the language"], meta: "The vaguer the goal, the easier to claim the course achieves it. 'Think in the language' is perfect — impossible to verify." },

    getProfile: (a) => {

      return {
        mirror: `Based on your answers, you're the ${p.type} Type. ${a.frustration === "Can't remember vocab" ? `You learn a word in ${lang}, feel confident, and by Tuesday it's gone. You've reviewed the same flashcard 50 times and it still won't stick.` : a.frustration === "Can't understand natives" ? `You can read ${lang} reasonably well. You can construct sentences. But when a native speaker talks at normal speed, it's a blur. You catch maybe every third word.` : a.frustration === "Freeze when speaking" ? `You KNOW the words. In your head, you can form the sentence. But the moment someone speaks to you in ${lang}, your mind goes blank. The pressure kills your ability to think.` : `Between work and life, you manage maybe 10 minutes on an app. You feel like you're not progressing because you can't commit the hours.`}`,
        agitate: `${usedApps ? `You've kept a Duolingo streak going for months — maybe years. You can match pictures to words. But put you in a café in ${lang === "Spanish" ? "Madrid" : lang === "French" ? "Paris" : lang === "Italian" ? "Rome" : "the country"} and you're lost.` : `You've invested real time and money in ${a.method === "Classroom / course" ? "classes" : "study materials"}. You can pass a written test. But real conversations? Different planet.`} ${inter ? `You've hit the intermediate plateau — the most demoralising stage. Beginners see fast progress. Advanced learners are fine. You're stuck in the middle, making the same mistakes, unable to break through.` : `People who started after you seem to be progressing faster. What are they doing differently?`} Maybe you just don't have a "language brain."`,
        eliminate: `Here's the truth. It's NOT your brain. ${usedApps ? "Apps like Duolingo are brilliant at one thing: keeping you using the app. They're gamified retention tools, not language acquisition systems. The dopamine hit of a green streak is not the same as fluency." : "Traditional methods teach you ABOUT the language — grammar rules, vocabulary lists, conjugation tables. But knowing ABOUT a language and SPEAKING it are completely different skills."} ${inter ? "And the intermediate plateau isn't a ceiling — it's a sign you need a fundamentally different approach." : "The reason you're stuck is that you've been using tools designed for the wrong stage of acquisition."}`,
        authority: `I speak 7 languages fluently. Not because I'm gifted — I failed French at school. It wasn't until I discovered the acquisition method used by polyglots and intelligence agencies that everything clicked. I went from zero to conversational ${lang === "Other" ? "in Mandarin" : `in ${lang}`} in 4 months. Now I've taught this method to over 20,000 students.`,
        m1: `You're memorising when you should be acquiring. ${a.frustration === "Can't remember vocab" ? "Flashcards and word lists use your short-term memory. Real acquisition happens through comprehensible input — hearing and reading the language in context, just above your current level." : "Traditional study activates your analytical brain. Real fluency lives in your procedural memory — the same system that lets you ride a bike."} There's a specific input method — ${inter ? "calibrated for intermediate learners" : "designed for your exact level"} — that bypasses rote memorisation entirely. But the input type and difficulty matter — get it wrong and nothing sticks.`,
        m2: `You're not speaking early enough — or you're speaking wrong. ${a.frustration === "Freeze when speaking" ? "The freeze happens because you're translating in your head. There's a specific technique that trains your brain to produce language directly — no translation step." : "Most learners either avoid speaking (too scary) or speak without structure (reinforcing errors)."} The method I use involves structured conversation drills that build automatic responses. Not memorised phrases — genuine spontaneous speech. But the drill format is specific and the progression matters.`,
        m3: `Your practice schedule is fighting your brain. ${a.frustration === "No time to practise" ? "You don't need more time — you need the right time. 15 minutes of targeted practice at the right moment in your day beats 2 hours of unfocused study." : "Long study sessions create an illusion of progress. Your brain acquires language in short, intense bursts with sleep consolidation in between."} There's a specific scheduling protocol based on memory consolidation research — but most courses ignore it because longer = more expensive.`,
        gap: `So what input, exactly? Which conversation drills? What schedule? The principles make sense — but the specific protocol makes it work. You could experiment for months... or follow the system I've built for ${lang} learners at your exact level.`,
        value: `The complete system: 12-week acquisition programme for ${lang}. Daily 15-minute guided sessions. Comprehensible input library graded to your level. Structured conversation drills with audio. PLUS: pronunciation masterclass (£35 value, FREE). Cultural context guide (£20 value, FREE). Spaced repetition deck (£25 value, FREE). Total value: £200+.`,

      };

    advice: [
      { icon: "👂", title: "Input is king — listen and read a LOT", detail: "Comprehensible input (Krashen's theory) is well-supported. Listen to podcasts, watch TV, read graded readers — slightly above your level. Volume matters more than perfection." },
      { icon: "🗣️", title: "Speak early, speak badly, speak often", detail: "You will be bad at first. That's fine. Find a conversation partner (italki, Tandem, local meetups) and start using the language in messy, imperfect conversations. Fluency comes from doing, not studying." },
      { icon: "📱", title: "Apps are fine — for what they are", detail: "Duolingo, Babbel, Memrise — they're good for building initial vocabulary and habit formation. They're not the enemy. They're just not enough on their own. Use them as one tool among many." },
      { icon: "🧠", title: "There's no 'language brain'", detail: "Everyone who learned their first language has the hardware for a second. Age makes it slower, not impossible. The biggest predictor of success is sustained contact with the language — not talent." },
      { icon: "✈️", title: "Immersion works — but you can create it at home", detail: "Change your phone language. Listen to radio in the background. Follow social media accounts. Watch TV with target-language subtitles (not English ones). You don't need to move abroad." },

            <p style={{ fontFamily: "var(--d)", fontSize: 13, fontWeight: 300, textTransform: "uppercase", letterSpacing: 3, color: "#ff4848", marginBottom: 18 }}>Same Formula. Different Skin.</p>
            <p style={{ fontSize: 12, color: "#666", lineHeight: 1.6, maxWidth: 400, margin: "0 auto 8px" }}>
              Pick a niche below. You'll go through a realistic marketing quiz, then watch an AI-generated sales pitch that adapts to your answers — annotated with the manipulation technique at every step.
            </p>
            <p style={{ fontSize: 12, color: "#666", lineHeight: 1.6, maxWidth: 400, margin: "0 auto 18px" }}>
              The point: the <em>formula is identical</em> regardless of the subject. Mirror, agitate, eliminate, authority, withhold, stack, price, reverse, scare, handle. Every. Single. Time.
            </p>

            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 8 }}>
              {Object.entries(FUNNELS).map(([key, f]) => (
                <button key={key} onClick={() => { setFunnel(key); setPhase("splash"); }} style={{
                  padding: "16px", background: "#111128", border: `1px solid ${f.color}30`,
                  borderRadius: 10, cursor: "pointer", textAlign: "left", transition: "all 0.2s",
                  display: "flex", alignItems: "center", gap: 12,
                }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = f.color + "66"; e.currentTarget.style.background = "#141430"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = f.color + "30"; e.currentTarget.style.background = "#111128"; }}
                >
                  <span style={{ fontSize: 28 }}>{f.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "var(--d)", fontSize: 15, fontWeight: 600, color: "#eee" }}>{f.name}</div>
                    <div style={{ fontSize: 11, color: "#666", fontStyle: "italic", marginTop: 2 }}>{f.tagline}</div>
                    {f.also && <div style={{ fontSize: 9.5, color: "#777", marginTop: 3 }}>{f.also}</div>}
                  </div>
                  <span style={{ color: f.color, fontSize: 16 }}>→</span>
                </button>
              ))}
            </div>

            <div style={{ marginTop: 20, padding: "9px 12px", background: "rgba(255,180,66,0.05)", border: "1px solid rgba(255,180,66,0.12)", borderRadius: 7, fontSize: 10.5, color: "#997733", textAlign: "left" }}>
              ⚠️ All scripts below are AI-generated examples demonstrating common marketing funnel techniques. They are not real marketing materials — they illustrate the formula.
            </div>
          </div>
        )}

        {/* ═══ SPLASH ═══ */}
        {phase === "splash" && f && (
          <div className="fi" style={{ textAlign: "center", paddingTop: 28 }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>{f.icon}</div>
            <h2 style={{ fontFamily: "var(--d)", fontSize: 20, fontWeight: 700, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Free {f.name} Quiz</h2>
            <p style={{ fontSize: 12, color: "#666", lineHeight: 1.6, maxWidth: 380, margin: "0 auto 20px" }}>
              Answer {f.quiz.length} quick questions. We'll generate a 'personalised' sales pitch adapted to your answers, then show you the technique behind every line.
            </p>
            <Ann color={accent}>🎯 The quiz IS the product. Each answer is a micro-commitment — you give personal data, invest time, and feel the results are 'earned.' By the end of {f.quiz.length} questions, leaving feels like wasting what you've already put in. The price at the end is deliberately low and reasonable-looking — because the real revenue comes from upsells, subscriptions, and supplements AFTER you're committed.</Ann>
            <button onClick={() => setPhase("quiz")} style={{ marginTop: 8, padding: "13px 40px", background: `linear-gradient(135deg,${accent},${accent}cc)`, color: "#fff", border: "none", borderRadius: 8, fontFamily: "var(--d)", fontSize: 15, fontWeight: 600, textTransform: "uppercase", letterSpacing: 2, cursor: "pointer", boxShadow: `0 4px 20px ${accent}40` }}>
              Start Quiz →
            </button>
            <p style={{ marginTop: 10, fontSize: 10, color: "#666" }}>No email. No upsells. Promise.</p>
            <button onClick={() => restart(true)} style={{ marginTop: 14, background: "none", border: "none", color: "#666", fontSize: 10.5, cursor: "pointer", fontFamily: "var(--m)", textDecoration: "underline" }}>← Pick a different funnel</button>
          </div>
        )}

        {/* ═══ QUIZ ═══ */}
        {phase === "quiz" && f && (
          <div className="fi" key={qi}>
            <div style={{ textAlign: "center", marginBottom: 3 }}>
              <span style={{ fontSize: 9, textTransform: "uppercase", letterSpacing: 3, color: "#777", fontFamily: "var(--d)" }}>{f.name} · Question {qi + 1} / {f.quiz.length}</span>
            </div>
            <div style={{ width: "100%", height: 3, background: "#141428", borderRadius: 2, overflow: "hidden", marginBottom: 18 }}>
              <div style={{ width: `${((qi + 1) / f.quiz.length) * 100}%`, height: "100%", background: `linear-gradient(90deg,${accent},${accent}bb)`, transition: "width 0.4s", borderRadius: 2 }} />
            </div>
            <h2 style={{ fontFamily: "var(--d)", fontSize: 22, fontWeight: 700, textAlign: "center", marginBottom: 16 }}>{f.quiz[qi].q}</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
              {f.quiz[qi].opts.map(o => (
                <button key={o} onClick={() => pick(o)} style={{
                  padding: "12px 14px", background: sel === o ? `linear-gradient(135deg,${accent},${accent}bb)` : "#111128",
                  color: sel === o ? "#fff" : "#aaa", border: `1px solid ${sel === o ? accent : "#1e1e38"}`,
                  borderRadius: 8, fontSize: 13.5, cursor: "pointer", textAlign: "left", transition: "all 0.2s", fontFamily: "var(--m)",
                }}>{o}</button>
              ))}
            </div>
            {notes && <Ann color={accent}>🎯 {f.quiz[qi].meta}</Ann>}
            {qi > 0 && notes && (
              <div style={{ fontSize: 10, color: "#666", textAlign: "center", marginTop: 6 }}>
                {qi + 1} data points given. Each one makes leaving feel like waste.
              </div>
            )}
          </div>
        )}

        {/* ═══ LOADING ═══ */}
        {phase === "loading" && (
          <div style={{ textAlign: "center", padding: "44px 0" }}>
            <div style={{ width: 52, height: 52, margin: "0 auto 20px", border: `3px solid #141428`, borderTop: `3px solid ${accent}`, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
            <p style={{ fontSize: 12, color: "#777", marginBottom: 14, minHeight: 28 }}>{loadMsgs[lm]}</p>
            <div style={{ width: "60%", height: 4, background: "#141428", borderRadius: 2, margin: "0 auto", overflow: "hidden" }}>
              <div style={{ width: `${lp}%`, height: "100%", background: `linear-gradient(90deg,${accent},${accent}bb)`, borderRadius: 2, transition: "width 0.08s" }} />
            </div>
            {notes && <Ann color={accent}>🎯 Pure theatre. You answered {f?.quiz.length || 5} multiple-choice questions. A calculator watch from 1985 could process this in microseconds. But the wait makes it feel scientific, valuable, and worth protecting.</Ann>}
          </div>
        )}

        {/* ═══ RESULTS ═══ */}
        {phase === "results" && f && profile && (
          <div>
            <div style={{ padding: "7px 10px", background: "rgba(255,180,66,0.04)", border: "1px solid rgba(255,180,66,0.1)", borderRadius: 6, fontSize: 10, color: "#886622", marginBottom: 10, textAlign: "center" }}>
              ⚠️ AI-generated example of {f.name.toLowerCase()} marketing funnel techniques
            </div>

            {/* Profile badge */}
            <div style={{ display: "flex", alignItems: "center", gap: 9, padding: "10px 12px", background: "#111128", borderRadius: 9, marginBottom: 12 }}>
              <span style={{ fontSize: 26 }}>{profile.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "var(--d)", fontSize: 8.5, textTransform: "uppercase", letterSpacing: 2, color: accent }}>Your "type"</div>
                <div style={{ fontFamily: "var(--d)", fontSize: 16, fontWeight: 700 }}>The {profile.type} Type</div>
                <div style={{ fontSize: 10, color: "#777", fontStyle: "italic" }}>{profile.line}</div>
              </div>
            </div>

            {/* Controls row */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 8 }}>
              <button onClick={() => setNotes(n => !n)} style={{ padding: "4px 10px", background: notes ? `${accent}12` : "#111128", border: `1px solid ${notes ? accent + "33" : "#1e1e38"}`, borderRadius: 5, color: notes ? accent : "#777", fontSize: 10, cursor: "pointer", fontFamily: "var(--m)", whiteSpace: "nowrap" }}>
                {notes ? "🔍 Hide" : "🔍 Show"} notes
              </button>
              <div style={{ display: "flex", gap: 2, background: "#111128", borderRadius: 6, padding: 2 }}>
                {[{ k: "video", l: "📹 Pitch" }, { k: "advice", l: "✅ Real" }, { k: "formula", l: "🔬 Formula" }].map(t => (
                  <button key={t.k} onClick={() => { setTab(t.k); top(); }} style={{
                    padding: "6px 9px", background: tab === t.k ? accent : "transparent",
                    color: tab === t.k ? "#fff" : "#777", border: "none", borderRadius: 4,
                    fontSize: 10.5, fontWeight: 600, cursor: "pointer", fontFamily: "var(--m)",
                  }}>{t.l}</button>
                ))}
              </div>
            </div>

            {/* ── PITCH TAB ── */}
            {tab === "video" && (
              <div className="fi" key={vi}>
                <div style={{ display: "flex", gap: 2, marginBottom: 14 }}>
                  {PHASE_TEMPLATE.map((_, i) => (
                    <div key={i} onClick={() => { setVi(i); top(); }} style={{ flex: 1, height: 3, borderRadius: 2, cursor: "pointer", background: i <= vi ? `linear-gradient(90deg,${accent},${accent}bb)` : "#181830" }} />
                  ))}
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 22 }}>{PHASE_TEMPLATE[vi].icon}</span>
                  <div>
                    <div style={{ fontFamily: "var(--d)", fontSize: 8.5, textTransform: "uppercase", letterSpacing: 2, color: accent }}>{vi + 1} / {PHASE_TEMPLATE.length}</div>
                    <h3 style={{ fontFamily: "var(--d)", fontSize: 17, fontWeight: 700 }}>{PHASE_TEMPLATE[vi].label}</h3>
                  </div>
                </div>

                {notes && <div style={{ padding: "9px 11px", marginBottom: 10, background: `${accent}08`, border: `1px solid ${accent}1a`, borderRadius: 8, fontSize: 11, lineHeight: 1.6, color: accent + "cc" }}>🎭 <strong>Technique:</strong> {PHASE_TEMPLATE[vi].technique}</div>}

                <div style={{ background: "#111128", borderRadius: 9, padding: "13px 13px", borderLeft: `3px solid ${accent}`, marginBottom: 14 }}>
                  <p style={{ fontSize: 12.5, lineHeight: 1.75, color: "#bbb", fontStyle: "italic" }}>
                    "{(() => {
                      const k = PHASE_TEMPLATE[vi].key;
                      if (scripts[k]) return scripts[k];
                      if (k === "risk") return "Start today. Follow it for 60 days. If it doesn't work, send ONE email — full refund. Zero risk. It works or your money back.";
                      if (k === "scarcity") return "Imagine where you'll be in 3 months. The confidence. The results. You'll wish you'd started sooner. This offer is ONLY available through this page. Once you leave, the price goes back up.";
                      if (k === "objections") return "\"I don't have time.\" — It's designed for busy people. \"I've tried everything.\" — Not this approach. \"Not sure it works for me.\" — 60-day guarantee. Zero risk.";
                      return "";
                    })()}"
                  </p>
                </div>

                <div style={{ display: "flex", gap: 6 }}>
                  {vi > 0 && <button onClick={() => { setVi(i => i - 1); top(); }} style={{ flex: 1, padding: 10, background: "#111128", color: "#777", border: "1px solid #1e1e38", borderRadius: 6, fontSize: 11.5, cursor: "pointer", fontFamily: "var(--m)" }}>←</button>}
                  {vi < PHASE_TEMPLATE.length - 1 ? (
                    <button onClick={() => { setVi(i => i + 1); top(); }} style={{ flex: 3, padding: 10, background: `linear-gradient(135deg,${accent},${accent}bb)`, color: "#fff", border: "none", borderRadius: 6, fontFamily: "var(--d)", fontSize: 13, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, cursor: "pointer" }}>Next →</button>
                  ) : (
                    <button onClick={() => { setTab("advice"); top(); }} style={{ flex: 3, padding: 10, background: "linear-gradient(135deg,#48c78e,#36a374)", color: "#fff", border: "none", borderRadius: 6, fontFamily: "var(--d)", fontSize: 13, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, cursor: "pointer" }}>Real advice →</button>
                  )}
                </div>

                {/* Phase list */}
                <div style={{ marginTop: 18 }}>
                  {PHASE_TEMPLATE.map((p, i) => (
                    <div key={i} onClick={() => { setVi(i); top(); }} style={{
                      display: "flex", alignItems: "center", gap: 7, padding: "6px 8px", marginBottom: 2,
                      background: i === vi ? `${accent}0c` : "transparent",
                      border: `1px solid ${i === vi ? accent + "20" : "transparent"}`,
                      borderRadius: 5, cursor: "pointer",
                    }}>
                      <span style={{ fontSize: 12, width: 20, textAlign: "center" }}>{p.icon}</span>
                      <span style={{ fontSize: 10.5, color: i === vi ? accent : i < vi ? "#777" : "#666", fontWeight: i === vi ? 600 : 400, flex: 1 }}>{p.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── REAL ADVICE TAB ── */}
            {tab === "advice" && (
              <div className="fi">
                <h3 style={{ fontFamily: "var(--d)", fontSize: 17, fontWeight: 700, marginBottom: 2 }}>What Actually Works</h3>
                <p style={{ fontSize: 10.5, color: "#777", marginBottom: 14 }}>Evidence-based. Free or cheap. No funnel required.</p>
                {f.advice.map((r, i) => (
                  <div key={i} style={{ background: "#111128", borderRadius: 9, padding: "12px 12px", marginBottom: 7, borderLeft: "3px solid #48c78e" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 4 }}>
                      <span style={{ fontSize: 15 }}>{r.icon}</span>
                      <h4 style={{ fontFamily: "var(--d)", fontSize: 11.5, fontWeight: 600, color: "#eee", textTransform: "uppercase", letterSpacing: 0.5 }}>{r.title}</h4>
                    </div>
                    <p style={{ fontSize: 11.5, color: "#777", lineHeight: 1.6 }}>{r.detail}</p>
                  </div>
                ))}
                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 9, textTransform: "uppercase", letterSpacing: 2, color: "#48c78e", marginBottom: 7 }}>Free / low-cost resources</div>
                  {f.resources.map((r, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 10px", background: "#111128", borderRadius: 6, marginBottom: 3, alignItems: "center" }}>
                      <div>
                        <div style={{ fontSize: 11.5, color: "#ddd", fontWeight: 600 }}>{r.name}</div>
                        <div style={{ fontSize: 9.5, color: "#777" }}>{r.desc}</div>
                      </div>
                      <div style={{ fontSize: 9, color: "#48c78e", whiteSpace: "nowrap" }}>{r.where}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── FORMULA TAB ── */}
            {tab === "formula" && (
              <div className="fi">
                <h3 style={{ fontFamily: "var(--d)", fontSize: 17, fontWeight: 700, marginBottom: 2 }}>The Universal Formula</h3>
                <p style={{ fontSize: 10.5, color: "#777", marginBottom: 14 }}>Every funnel. Every niche. Every time.</p>
                {PHASE_TEMPLATE.map((p, i) => (
                  <div key={i} style={{
                    display: "flex", gap: 10, padding: "10px 11px", marginBottom: 4,
                    background: "#111128", borderRadius: 8,
                    borderLeft: `3px solid ${i < 4 ? "#8b5cf6" : i < 8 ? accent : "#48c78e"}`,
                  }}>
                    <span style={{ fontSize: 16, width: 24, textAlign: "center", flexShrink: 0, paddingTop: 1 }}>{p.icon}</span>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#ddd", marginBottom: 2 }}>{i + 1}. {p.label}</div>
                      <div style={{ fontSize: 10.5, color: "#666", lineHeight: 1.5 }}>{p.technique}</div>
                    </div>
                  </div>
                ))}
                <div style={{ background: "rgba(72,199,142,0.06)", border: "1px solid rgba(72,199,142,0.14)", borderRadius: 9, padding: 13, marginTop: 12 }}>
                  <div style={{ fontFamily: "var(--d)", fontSize: 9, textTransform: "uppercase", letterSpacing: 2, color: "#48c78e", marginBottom: 5 }}>The tell</div>
                  <p style={{ fontSize: 11.5, color: "#999", lineHeight: 1.6 }}>
                    If you can predict the next step in the video, it's a formula, not expertise. Try it: watch any long-form sales video and call out each phase as it happens. Once you see the skeleton, you can never unsee it.
                  </p>
                </div>
                <Ann color="#8b5cf6">💡 Try any of the funnels and compare. The scripts are different but the structure is identical — the subject doesn't matter. The manipulation does.</Ann>
              </div>
            )}

            {/* Restart options */}
            <div style={{ marginTop: 20, display: "flex", gap: 6 }}>
              <button onClick={() => restart(false)} style={{ flex: 1, padding: 9, background: "transparent", color: "#666", border: "1px solid #2a2a44", borderRadius: 6, fontSize: 10.5, cursor: "pointer", fontFamily: "var(--m)" }}>↩ Retake quiz</button>
              <button onClick={() => restart(true)} style={{ flex: 1, padding: 9, background: "transparent", color: "#666", border: "1px solid #2a2a44", borderRadius: 6, fontSize: 10.5, cursor: "pointer", fontFamily: "var(--m)" }}>🔀 Try another funnel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
